# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: ko

timezone: Asia/Seoul

# jekyll-seo-tag settings
title: Bong's Dev Blog
tagline: 개발 학습과 경험을 기록하는 블로그
description: >-
  인증/인가, 분산 시스템, 백엔드 아키텍처에 대한 학습 기록과 실무 경험을 공유합니다.

url: "https://leebongseung.github.io"

github:
  username: leebongseung

twitter:
  username:

social:
  name: BongSeung Lee
  email: yui5227@idstrust.com
  fediverse_handle:
  links:
    - https://github.com/leebongseung

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

# Prefer color scheme setting.
# light — Use the light color scheme
# dark — Use the dark color scheme
# empty — Follow system preference (toggle available at sidebar)
theme_mode:

cdn:

avatar:

social_preview_image:

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  provider: giscus
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo: leebongseung/leebongseung.github.io
    repo_id: R_kgDOR7guZA
    category: Announcements
    category_id: DIC_kwDOR7guZM4C7T1U
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: ko
    reactions_enabled: 1

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
