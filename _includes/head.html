<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {%- feed_meta -%}
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <style>
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
      .site-header { background: #16213e; border-bottom-color: #2a2a4a; }
      .site-header a, .site-header a:visited { color: #e0e0e0; }
      .site-nav .page-link { color: #e0e0e0; }
      .site-title, .site-title:visited { color: #e0e0e0; }
      .site-footer { background: #16213e; border-top-color: #2a2a4a; color: #999; }
      a { color: #6db3f2; }
      a:visited { color: #b39ddb; }
      h1, h2, h3, h4 { color: #f0f0f0; }
      code { background: #2a2a4a; color: #e0e0e0; }
      pre, .highlight { background: #1e1e30 !important; }
      table th { background: #2a2a4a; }
      table td, table th { border-color: #3a3a5a; }
      blockquote { color: #aaa; border-left-color: #3a3a5a; }
      #toc-sidebar { background: #16213e; border-color: #2a2a4a; }
      #toc-list li a { color: #aaa; }
      #toc-list li a:hover, #toc-list li a.toc-active { color: #f0f0f0; }
      .post-meta { color: #888; }
      .post-meta a { background: #2a2a4a !important; color: #ccc !important; }
    }
  </style>
</head>
